name: Production UAT Credentials

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: "Type SYNC_PRODUCTION_UAT_CREDENTIALS to rotate the six protected UAT accounts."
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: production-uat-credentials
  cancel-in-progress: false

jobs:
  synchronize:
    name: Synchronize and verify protected UAT accounts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - name: Validate confirmation
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
        run: test "$CONFIRMATION" = "SYNC_PRODUCTION_UAT_CREDENTIALS"

      - name: Checkout
        uses: actions/checkout@v5

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      - name: Trust production host
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
        run: ssh-keyscan -p "$PROD_SSH_PORT" -H "$PROD_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Synchronize credentials on production host
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          PROD_DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
          PROD_UAT_CREDENTIALS_CSV: ${{ secrets.PROD_UAT_CREDENTIALS_CSV }}
        run: |
          set -eu
          test -n "$PROD_UAT_CREDENTIALS_CSV"
          SSH_OPTS="-p $PROD_SSH_PORT -o ServerAliveInterval=30 -o ServerAliveCountMax=20 -o TCPKeepAlive=yes -o ConnectTimeout=30"
          SCP_OPTS="-P $PROD_SSH_PORT -o ServerAliveInterval=30 -o ServerAliveCountMax=20 -o TCPKeepAlive=yes -o ConnectTimeout=30"
          local_credentials="$(mktemp)"
          remote_credentials="$PROD_DEPLOY_PATH/tmp/production-uat-${GITHUB_RUN_ID}.csv"
          cleanup() {
            rm -f "$local_credentials"
            ssh $SSH_OPTS "$PROD_SSH_USER@$PROD_SSH_HOST" "rm -f '$remote_credentials'" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT INT TERM
          umask 077
          printf '%s' "$PROD_UAT_CREDENTIALS_CSV" > "$local_credentials"
          ssh $SSH_OPTS "$PROD_SSH_USER@$PROD_SSH_HOST" "mkdir -p '$PROD_DEPLOY_PATH/tmp' && chmod 700 '$PROD_DEPLOY_PATH/tmp'"
          scp $SCP_OPTS "$local_credentials" "$PROD_SSH_USER@$PROD_SSH_HOST:$remote_credentials"
          ssh $SSH_OPTS "$PROD_SSH_USER@$PROD_SSH_HOST" "chmod 600 '$remote_credentials' && cd '$PROD_DEPLOY_PATH' && node scripts/go-live-uat-user-login-check.mjs --sync-credentials --credentials '$remote_credentials' --api-base 'https://park.cnjinhu.com/api/v1' --web-base 'https://park.cnjinhu.com'"

      - name: Verify public production authentication
        env:
          PROD_UAT_CREDENTIALS_CSV: ${{ secrets.PROD_UAT_CREDENTIALS_CSV }}
        run: |
          set -eu
          credentials="$(mktemp)"
          trap 'rm -f "$credentials"' EXIT INT TERM
          umask 077
          printf '%s' "$PROD_UAT_CREDENTIALS_CSV" > "$credentials"
          node scripts/go-live-uat-user-login-check.mjs \
            --credentials "$credentials" \
            --api-base https://park.cnjinhu.com/api/v1 \
            --web-base https://park.cnjinhu.com
