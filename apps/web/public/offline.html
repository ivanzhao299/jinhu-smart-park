<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#111827" />
    <title>网络不可用 | 金湖园区</title>
    <style>
      :root { color-scheme: light; font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif; }
      * { box-sizing: border-box; }
      body { display: grid; min-height: 100dvh; margin: 0; padding: 24px; place-items: center; background: #eef2f6; color: #111827; }
      main { width: min(100%, 420px); padding: 28px; border: 1px solid #d7dee7; border-radius: 16px; background: #fff; box-shadow: 0 18px 48px rgba(15,23,42,.12); }
      h1 { margin: 0 0 10px; font-size: 24px; }
      p { margin: 0 0 22px; color: #475569; line-height: 1.7; }
      button { width: 100%; min-height: 48px; border: 0; border-radius: 10px; background: #0f766e; color: #fff; font-size: 16px; font-weight: 750; }
    </style>
  </head>
  <body>
    <main>
      <h1>当前网络不可用</h1>
      <p>请检查现场网络后重试。已保存的本地草稿不会丢失。</p>
      <button type="button" onclick="location.reload()">重新连接</button>
    </main>
  </body>
</html>
