name: jinhu-smart-park-prod

services:
  postgres:
    image: postgres:16-alpine
    container_name: jinhu-smart-park-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jinhu_smart_park}
      POSTGRES_USER: ${POSTGRES_USER:-jinhu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_PUBLISHED_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jinhu} -d ${POSTGRES_DB:-jinhu_smart_park}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    container_name: jinhu-smart-park-prod-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      APP_PORT: 3001
      API_PREFIX: ${API_PREFIX:-api/v1}
      WEB_ORIGIN: ${WEB_ORIGIN:?WEB_ORIGIN is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-10}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-jinhu_smart_park}
      POSTGRES_USER: ${POSTGRES_USER:-jinhu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      DEFAULT_TENANT_CODE: ${DEFAULT_TENANT_CODE:-jinhu}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-10000001}
      DEFAULT_PARK_ID: ${DEFAULT_PARK_ID:-20000001}
      REDIS_URL: ${REDIS_URL:-}
      MQTT_BROKER_URL: ${MQTT_BROKER_URL:-}
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      RABBITMQ_URL: ${RABBITMQ_URL:-}
      TIMESCALE_URL: ${TIMESCALE_URL:-}
      IOT_RULE_WEBHOOK_ALLOWLIST: ${IOT_RULE_WEBHOOK_ALLOWLIST:-}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-}
      MINIO_BUCKET: ${MINIO_BUCKET:-}
      AI_PROVIDER: ${AI_PROVIDER:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_DEFAULT_MODEL: ${AI_DEFAULT_MODEL:-}
    ports:
      - "${API_PUBLISHED_PORT:-3001}:3001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3001/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_TARGET: ${NEXT_PUBLIC_API_TARGET:-http://api:3001}
        NEXT_PUBLIC_API_PREFIX: ${NEXT_PUBLIC_API_PREFIX:-/api/v1}
    container_name: jinhu-smart-park-prod-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      WEB_PORT: 3000
      NEXT_PUBLIC_API_TARGET: ${NEXT_PUBLIC_API_TARGET:-http://api:3001}
      NEXT_PUBLIC_API_PREFIX: ${NEXT_PUBLIC_API_PREFIX:-/api/v1}
    ports:
      - "${WEB_PUBLISHED_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
