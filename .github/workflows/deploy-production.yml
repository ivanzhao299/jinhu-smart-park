name: Deploy Production

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production host
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Trust production host
        run: ssh-keyscan -H "${{ secrets.PROD_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
        run: |
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='node_modules/' \
            --exclude='**/node_modules/' \
            --exclude='.next/' \
            --exclude='**/.next/' \
            --exclude='dist/' \
            --exclude='**/dist/' \
            --exclude='coverage/' \
            --exclude='**/coverage/' \
            --exclude='logs/' \
            --exclude='tmp/' \
            --exclude='temp/' \
            --exclude='uploads/' \
            --exclude='storage/' \
            --exclude='data/' \
            ./ "$PROD_USER@$PROD_HOST:$PROD_DEPLOY_PATH/"
          ssh "$PROD_USER@$PROD_HOST" "cd '$PROD_DEPLOY_PATH' && PRUNE_DOCKER_AFTER_DEPLOY=yes pnpm prod:deploy && pnpm prod:health"
